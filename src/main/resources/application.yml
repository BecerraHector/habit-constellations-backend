spring:
  application:
    name: habit-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/habits}
    username: ${SPRING_DATASOURCE_USERNAME:habits}
    password: ${SPRING_DATASOURCE_PASSWORD:habits}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway es la unica fuente de verdad del esquema; Hibernate solo lo valida.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

habits:
  security:
    jwt:
      secret: ${HABITS_SECURITY_JWT_SECRET:}
      access-token-ttl: PT30M
      refresh-token-ttl: P30D
      issuer: habit-tracker

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.constellations.habits: DEBUG
