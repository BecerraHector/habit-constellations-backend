name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    name: Build y tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Testcontainers levanta Postgres solo; el runner ya trae Docker.
      - name: Verificar y testear
        run: ./mvnw -B verify

      - name: Publicar informe de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  secrets:
    name: Escaneo de secretos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks necesita el historial completo para escanear commits pasados.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
